services:
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/thinkmap123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "thinkmap123", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=thinkmap123
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${AWS_PUBLIC_IP}:8000
      - NEXT_PUBLIC_WS_URL=ws://${AWS_PUBLIC_IP}:8000
    depends_on:
      - backend
    restart: always

volumes:
  neo4j_data:
  qdrant_data:
