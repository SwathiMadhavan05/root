version: "1"

services:
  # FastAPI Backend (Free Tier Web Service)
  - type: web
    name: thinkmap-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: NEO4J_URI
        sync: false # Enter your Neo4j Aura URI in the dashboard (e.g., neo4j+s://...)
      - key: NEO4J_USER
        sync: false # Enter your Neo4j Aura username
      - key: NEO4J_PASSWORD
        sync: false # Enter your Neo4j Aura password
      - key: QDRANT_URL
        sync: false # Enter your Qdrant Cloud URL
      - key: QDRANT_API_KEY
        sync: false # Enter your Qdrant Cloud API Key
      - key: GROQ_API_KEY
        sync: false # Enter your Groq API Key
